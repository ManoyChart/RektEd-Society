<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Manoy Chart</title>

<style>
html, body {
    background: radial-gradient(circle at top, #0a0a0a, #000000);
    color:#e6edf3;
    font-family: 'Segoe UI', Arial;
    overflow-x:hidden;
}

.container {
    max-width:1200px;
    margin:auto;
    padding:20px;
}

.hero h1 { font-size:34px; }
.highlight { color:#b6ff00; text-shadow:0 0 8px #b6ff00; }
.sub { color:#8b9bb4; }

.cards {
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-top:20px;
}

.card {
    flex:1;
    min-width:150px;
    background:rgba(255,255,255,0.02);
    border:1px solid rgba(255,255,255,0.05);
    padding:15px;
    border-radius:12px;
    text-align:center;
}

.btn {
    background:#b6ff00;
    border:none;
    padding:10px 12px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
    color:black;
}

.btn:hover { box-shadow:0 0 10px #b6ff00; }

.panel {
    margin-top:20px;
    background:rgba(255,255,255,0.02);
    border-radius:12px;
    padding:10px;
    overflow-x:auto;
}

.table {
    width:100%;
    border-collapse:collapse;
}

.table th, .table td {
    padding:12px;
}

.table tr {
    border-bottom:1px solid rgba(255,255,255,0.05);
    cursor:pointer;
}

.table tr:hover {
    background:rgba(182,255,0,0.05);
}

.badge {
    padding:4px 10px;
    border-radius:20px;
    font-size:12px;
}

.pump { background:#ff3b3b; }
.early { background:#ffae00; color:black; }
.accum { background:#00ff9f; color:black; }
.smart { background:#00d4ff; color:black; }
.fake { background:#9b59ff; }

.liquidity {
    height:6px;
    background:#111;
    border-radius:5px;
}

.liq-bar {
    height:6px;
    background:#b6ff00;
    border-radius:5px;
}
</style>
</head>

<body>

<div class="container">

<div class="hero">
<h1><span class="highlight">RektEd Society</span> Crypto Intelligence</h1>
<p class="sub">AI smart money tracking, whale detection & pump signals</p>
<br>
<button class="btn" onclick="refreshMarket()">🔄 Refresh Market</button>
</div>

<!-- STATS -->
<div class="cards">
<div class="card">🔥 Pumps <div id="pumps">0</div></div>
<div class="card">🚀 Early <div id="early">0</div></div>
<div class="card">🧠 Accum <div id="accum">0</div></div>
<div class="card">🧠 Smart <div id="smartmoney">0</div></div>
<div class="card">🐋 Whale <div id="topwhale">0%</div></div>
</div>

<!-- BUTTONS -->
<div class="cards">

<button class="btn" onclick="setFilter('all')">📊 All</button>
<button class="btn" onclick="sortWhales()">🐋 Top Whales</button>
<button class="btn" onclick="sortGainers()">🚀 Top Gainers</button>

<button class="btn" onclick="setFilter('pump')">🔥 Strong Pump</button>
<button class="btn" onclick="setFilter('early')">🚀 Early Pump</button>
<button class="btn" onclick="setFilter('accum')">🧠 Accumulation</button>
<button class="btn" onclick="setFilter('smart')">🧠 Smart Money</button>

</div>

<!-- TABLE -->
<div class="panel">
<table class="table">
<thead>
<tr>
<th>#</th>
<th>Coin</th>
<th>Price</th>
<th>24h%</th>
<th>Volume</th>
<th>Market Cap</th>
<th>AI Signal</th>
<th>Whale%</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

</div>

<script>

let dataStore = [];
let filterMode = "all";

// FORMAT
function format(n){
    if(!n) return "-";
    return n > 1e9 ? (n/1e9).toFixed(2)+"B" :
           n > 1e6 ? (n/1e6).toFixed(2)+"M" : n.toFixed(2);
}

// AI
function ai(c){

    let r = (c.total_volume / c.market_cap) || 0;
    let p = c.price_change_percentage_24h || 0;

    let score = r * 100;

    if(p > 5 && r > 0.15) return {label:"🔥 Strong Pump", class:"pump", score};
    if(p > 2) return {label:"🚀 Early Pump", class:"early", score};
    if(r > 0.12) return {label:"🧠 Smart Money", class:"smart", score};
    if(r > 0.05) return {label:"🧠 Accumulation", class:"accum", score};

    return null;
}

// FILTER
function setFilter(f){
    filterMode = f;
    render(dataStore);
}

// REFRESH
function refreshMarket(){
    filterMode = "all";
    load();
}

// SORT WHALE
function sortWhales(){
    let d = [...dataStore];
    d.sort((a,b)=>(b.total_volume/b.market_cap)-(a.total_volume/a.market_cap));
    render(d);
}

// SORT GAINERS
function sortGainers(){
    let d = [...dataStore];
    d.sort((a,b)=>(b.price_change_percentage_24h||0)-(a.price_change_percentage_24h||0));
    render(d);
}

// RENDER
function render(data){

    let html = "";
    let pumps=0, early=0, accum=0, smart=0;

    let filtered = data.map(c => ({...c, ai: ai(c)}))
                       .filter(c => c.ai !== null);

    filtered = filtered.filter(c => {
        if(filterMode === "all") return true;
        if(filterMode === "pump") return c.ai.class === "pump";
        if(filterMode === "early") return c.ai.class === "early";
        if(filterMode === "accum") return c.ai.class === "accum";
        if(filterMode === "smart") return c.ai.class === "smart";
        return true;
    });

    filtered.forEach((c,i)=>{

        let whale = (c.total_volume / c.market_cap) * 100;

        if(c.ai.class==="pump") pumps++;
        if(c.ai.class==="early") early++;
        if(c.ai.class==="accum") accum++;
        if(c.ai.class==="smart") smart++;

        html += `
        <tr onclick="openChart('${c.symbol}')">
        <td>${i+1}</td>
        <td>${c.name}</td>
        <td>$${c.current_price}</td>
        <td style="color:${c.price_change_percentage_24h>0?'#00ff9f':'#ff4d4d'}">
        ${c.price_change_percentage_24h.toFixed(2)}%
        </td>
        <td>$${format(c.total_volume)}</td>
        <td>$${format(c.market_cap)}</td>
        <td><span class="badge ${c.ai.class}">${c.ai.label}</span></td>
        <td>🐋 ${whale.toFixed(2)}%</td>
        </tr>`;
    });

    document.getElementById("table").innerHTML = html;

    document.getElementById("pumps").innerText = pumps;
    document.getElementById("early").innerText = early;
    document.getElementById("accum").innerText = accum;
    document.getElementById("smartmoney").innerText = smart;
}

// CHART
function openChart(sym){
    window.open(`https://www.tradingview.com/chart/?symbol=BINANCE:${sym.toUpperCase()}USDT`);
}

// LOAD
async function load(){

    let res = await fetch("https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=volume_desc&per_page=100&page=1");
    let json = await res.json();

    dataStore = json;
    render(json);

    let top = Math.max(...json.map(c => (c.total_volume/c.market_cap)*100));
    document.getElementById("topwhale").innerText = top.toFixed(2)+"%";
}

// INIT
load();

</script>

</body>
</html>
