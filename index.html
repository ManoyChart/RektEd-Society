<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Manoy Chart</title>

<style>
html, body {
    background: radial-gradient(circle at top, #0a0a0a, #000000);
    color:#e6edf3;
    font-family: 'Segoe UI', Arial;
    overflow-x:hidden;
}

.container { max-width:1200px; margin:auto; padding:20px; }

.hero h1 { font-size:34px; }
.highlight { color:#b6ff00; text-shadow:0 0 8px #b6ff00; }
.sub { color:#8b9bb4; }

.cards { display:flex; flex-wrap:wrap; gap:10px; margin-top:20px; }

.card {
    flex:1; min-width:150px;
    background:rgba(255,255,255,0.02);
    border:1px solid rgba(255,255,255,0.05);
    padding:15px; border-radius:12px;
    text-align:center;
}

.btn {
    background:#b6ff00;
    border:none;
    padding:10px 12px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
    color:black;
}
.btn:hover { box-shadow:0 0 10px #b6ff00; }

.panel {
    margin-top:20px;
    background:rgba(255,255,255,0.02);
    border-radius:12px;
    padding:10px;
    overflow-x:auto;
}

.table { width:100%; border-collapse:collapse; }

.table th, .table td { padding:12px; }

.table tr {
    border-bottom:1px solid rgba(255,255,255,0.05);
    cursor:pointer;
}

.table tr:hover { background:rgba(182,255,0,0.05); }

.badge {
    padding:4px 10px;
    border-radius:20px;
    font-size:12px;
}

.pump { background:#ff3b3b; }
.early { background:#ffae00; color:black; }
.accum { background:#00ff9f; color:black; }
.smart { background:#00d4ff; color:black; }
.none { background:#333; color:#aaa; }

.liquidity {
    width:100%;
    height:8px;
    background:#111;
    border-radius:5px;
    overflow:hidden;
}

.liq-bar {
    height:100%;
    background:linear-gradient(90deg,#00ff9f,#b6ff00,#ffae00,#ff3b3b);
}

.spark {
    width:120px;
    height:30px;
}
</style>
</head>

<body>

<div class="container">

<div class="hero">
<h1><span class="highlight">RektEd Society</span> Crypto Intelligence</h1>
<p class="sub">AI smart money tracking, whale detection & pump signals</p>

<br>

<button class="btn" onclick="refreshMarket()">🔄 Refresh Market</button>

<span id="updatedTime" style="margin-left:10px;color:#8b9bb4;font-size:13px;">
Updated: --
</span>

</div>

<!-- ✅ NEW MARKET OVERVIEW -->
<div class="cards">

<div class="card">
<div>Market Cap</div>
<div id="totalMarketCap">$0</div>
</div>

<div class="card">
<div>CMC20</div>
<div id="cmc20">$0</div>
</div>

<div class="card">
<div>Fear & Greed</div>
<div id="fearGreed">--</div>
</div>

<div class="card">
<div>Altcoin Season</div>
<div id="altSeason">-- / 100</div>
</div>

</div>

<!-- STATS -->
<div class="cards">
<div class="card">🔥 Pumps <div id="pumps">0</div></div>
<div class="card">🚀 Early <div id="early">0</div></div>
<div class="card">🧠 Accum <div id="accum">0</div></div>
<div class="card">🧠 Smart <div id="smartmoney">0</div></div>
<div class="card">🐋 Whale <div id="topwhale">0%</div></div>
</div>

<!-- BUTTONS -->
<div class="cards">
<button class="btn" onclick="setFilter('all')">📊 All</button>
<button class="btn" onclick="sortWhales()">🐋 Top Whales</button>
<button class="btn" onclick="sortGainers()">🚀 Top Gainers</button>
<button class="btn" onclick="setFilter('pump')">🔥 Strong Pump</button>
<button class="btn" onclick="setFilter('early')">🚀 Early Pump</button>
<button class="btn" onclick="setFilter('accum')">🧠 Accumulation</button>
<button class="btn" onclick="setFilter('smart')">🧠 Smart Money</button>
</div>

<!-- TABLE -->
<div class="panel">
<table class="table">
<thead>
<tr>
<th>#</th>
<th>Coin</th>
<th>Price</th>
<th>24h%</th>
<th>Volume</th>
<th>Market Cap</th>
<th>AI Signal</th>
<th>Whale%</th>
<th>Liquidity</th>
<th>7D Chart</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

</div>

<script>

let dataStore = [];
let prevStore = [];
let audioCtx = null;
let filterMode = "all";

/* TIME */
function updateTime(){
    document.getElementById("updatedTime").innerText =
        "Updated: " + new Date().toLocaleTimeString();
}

/* SOUND */
function playBeep(){
    try{
        if(!audioCtx){
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();

        osc.connect(gain);
        gain.connect(audioCtx.destination);

        osc.frequency.value = 800;
        gain.gain.value = 0.05;

        osc.start();
        setTimeout(()=>osc.stop(), 120);
    }catch(e){}
}

/* ALERT */
function showAlert(msg){
    let div = document.createElement("div");
    div.innerText = msg;

    div.style.position="fixed";
    div.style.top="20px";
    div.style.right="20px";
    div.style.background="#b6ff00";
    div.style.color="#000";
    div.style.padding="12px";
    div.style.borderRadius="10px";
    div.style.zIndex="9999";
    div.style.fontWeight="bold";

    document.body.appendChild(div);
    setTimeout(()=>div.remove(),2500);
}

/* AI */
function ai(c){
    let mc = c.market_cap || 1;
    let r = (c.total_volume / mc) || 0;
    let p = c.price_change_percentage_24h || 0;

    if(p > 5 && r > 0.15) return {label:"Strong Pump", class:"pump"};
    if(p > 2) return {label:"Early Pump", class:"early"};
    if(r > 0.12) return {label:"Smart Money", class:"smart"};
    if(r > 0.05) return {label:"Accumulation", class:"accum"};

    return {label:"", class:"none"};
}

/* MARKET OVERVIEW */
async function loadMarketOverview(){
    try{
        let global = await fetch("https://api.coingecko.com/api/v3/global");
        let g = await global.json();

        let cap = g.data.total_market_cap.usd;
        document.getElementById("totalMarketCap").innerText =
            "$" + (cap/1e12).toFixed(2) + "T";

        let btcDom = g.data.market_cap_percentage.btc;
        let cmc20 = 100 - btcDom;

        document.getElementById("cmc20").innerText = cmc20.toFixed(2);
        document.getElementById("altSeason").innerText = cmc20.toFixed(0) + " / 100";

        let fg = await fetch("https://api.alternative.me/fng/");
        let fgData = await fg.json();

        document.getElementById("fearGreed").innerText =
            fgData.data[0].value + " (" + fgData.data[0].value_classification + ")";

    }catch(e){}
}

/* FILTER */
function setFilter(f){ filterMode = f; render(dataStore); }
function refreshMarket(){ load(); }

/* SORT */
function sortWhales(){
    let d = [...dataStore];
    d.sort((a,b)=>(b.total_volume/(b.market_cap||1))-(a.total_volume/(a.market_cap||1)));
    render(d);
}
function sortGainers(){
    let d = [...dataStore];
    d.sort((a,b)=>(b.price_change_percentage_24h||0)-(a.price_change_percentage_24h||0));
    render(d);
}

/* SPARKLINE */
function drawSparkline(canvas,data){
    let ctx = canvas.getContext("2d");
    let w = canvas.width, h = canvas.height;

    let min = Math.min(...data);
    let max = Math.max(...data);

    // ✅ Detect trend
    let start = data[0];
    let end = data[data.length - 1];
    let isUp = end >= start;

    ctx.beginPath();
    data.forEach((p,i)=>{
        let x = (i/(data.length-1))*w;
        let y = h - ((p-min)/(max-min))*h;
        if(i===0) ctx.moveTo(x,y);
        else ctx.lineTo(x,y);
    });

    // ✅ Dynamic color
    ctx.strokeStyle = isUp ? "#00ff9f" : "#ff3b3b";
    ctx.lineWidth = 1.5;
    ctx.stroke();
}

/* RENDER */
function render(data){

    let html="";
    let pumps=0,early=0,accum=0,smart=0;

    let filtered = data.map(c=>({...c, ai: ai(c)}));

    if(prevStore.length){
        data.forEach(c=>{
            let prev = prevStore.find(x=>x.id===c.id);
            if(!prev) return;

            if(c.price_change_percentage_24h > 8 &&
               (prev.price_change_percentage_24h||0) <= 8){
                showAlert("🚨 NEW PUMP: " + c.name);
                playBeep();
            }
        });
    }

    filtered = filtered.filter(c=>{
        if(c.ai.class === "none") return false;
        if(filterMode==="all") return true;
        return c.ai.class===filterMode;
    });

    filtered.forEach((c,i)=>{
        let mc = c.market_cap||1;
        let whale = Math.min(100,(c.total_volume/mc)*100);

        if(c.ai.class==="pump") pumps++;
        if(c.ai.class==="early") early++;
        if(c.ai.class==="accum") accum++;
        if(c.ai.class==="smart") smart++;

        let spark = c.sparkline_in_7d?.price || [];

        html += `
        <tr onclick="openChart('${c.symbol}')">
        <td>${i+1}</td>
        <td>${c.name}</td>
        <td>$${c.current_price}</td>
        <td style="color:${c.price_change_percentage_24h>0?'#00ff9f':'#ff4d4d'}">
        ${c.price_change_percentage_24h.toFixed(2)}%
        </td>
        <td>$${c.total_volume.toLocaleString()}</td>
        <td>$${(c.market_cap||0).toLocaleString()}</td>
        <td><span class="badge ${c.ai.class}">${c.ai.label}</span></td>
        <td>🐋 ${whale.toFixed(2)}%</td>
        <td><div class="liquidity"><div class="liq-bar" style="width:${whale}%"></div></div></td>
        <td><canvas class="spark" width="120" height="30" data='${JSON.stringify(spark)}'></canvas></td>
        </tr>`;
    });

    document.getElementById("table").innerHTML = html;

    document.getElementById("pumps").innerText=pumps;
    document.getElementById("early").innerText=early;
    document.getElementById("accum").innerText=accum;
    document.getElementById("smartmoney").innerText=smart;

    document.querySelectorAll(".spark").forEach(c=>{
        let d=JSON.parse(c.getAttribute("data")||"[]");
        if(d.length>2) drawSparkline(c,d);
    });
}

/* CHART */
function openChart(sym){
    window.open(`https://www.tradingview.com/chart/?symbol=BINANCE:${sym.toUpperCase()}USDT`);
}

/* LOAD */
async function load(){

    let res = await fetch("https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=volume_desc&per_page=100&page=1&sparkline=true");
    let json = await res.json();

    dataStore = json;
    render(json);

    prevStore = json;
    updateTime();

    let top = Math.max(...json.map(c=>(c.total_volume/(c.market_cap||1))*100));
    document.getElementById("topwhale").innerText=top.toFixed(2)+"%";

    // ✅ NEW CONNECTED DATA
    loadMarketOverview();
}

load();

</script>

</body>
</html>
